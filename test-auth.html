<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste de Auth + Security Rules — Staging</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { background: #0a0a0a; color: #f5f5f5; padding: 24px; line-height: 1.5; min-height: 100vh; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { color: #E8920D; font-size: 28px; margin-bottom: 8px; }
  .env-badge { display: inline-block; background: #d4a017; color: #1a1814; padding: 4px 10px; border-radius: 4px; font-weight: 700; font-size: 12px; margin-bottom: 24px; }
  .card { background: #1a1814; border: 2px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 18px; margin-bottom: 12px; color: #E8920D; }
  input, button { display: block; width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 4px; border: 1.5px solid #444; background: #0a0a0a; color: #f5f5f5; font-size: 15px; }
  button { background: #E8920D; color: #1a1814; font-weight: 700; cursor: pointer; border-color: #E8920D; }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .test-result { padding: 12px; margin-top: 8px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.4; word-break: break-word; }
  .ok    { background: rgba(58,138,74,0.2);  border-left: 4px solid #3a8a4a; color: #6cc97c; }
  .fail  { background: rgba(192,57,43,0.2);  border-left: 4px solid #c0392b; color: #e57364; }
  .warn  { background: rgba(212,160,23,0.2); border-left: 4px solid #d4a017; color: #f0c04f; }
  .info  { background: rgba(58,110,168,0.15);border-left: 4px solid #3a6ea8; color: #8db5e2; }
  .user-info { background: #0a0a0a; padding: 8px 12px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 12px; margin-bottom: 12px; }
  hr { border: none; border-top: 1px solid #333; margin: 16px 0; }
</style>
</head>
<body>
<div class="container">
  <h1>🧪 Teste de Auth + Security Rules</h1>
  <span class="env-badge">ambiente: crosstrainer-comissoes-staging</span>

  <div class="card">
    <h2>Status</h2>
    <div id="status" class="test-result info">Inicializando Firebase…</div>
  </div>

  <div class="card" id="login-card">
    <h2>1. Login</h2>
    <input type="email"    id="email"    placeholder="email do admin"      autocomplete="username">
    <input type="password" id="password" placeholder="senha"                autocomplete="current-password">
    <button id="btn-login">Entrar</button>
    <button id="btn-logout" style="display:none;">Sair</button>
  </div>

  <div class="card" id="tests-card" style="display:none;">
    <h2>2. Testes de Security Rules</h2>
    <div class="user-info" id="user-info"></div>
    <button id="btn-run-tests">Rodar todos os testes</button>
    <hr>
    <div id="results"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ─── Config staging hardcoded (arquivo temporário de teste) ───
const stagingConfig = {
  apiKey: 'AIzaSyC5wqYNNyrJBPXbBPK8gRxQxOPHTIW7TFo',
  authDomain: 'crosstrainer-comissoes-staging.firebaseapp.com',
  projectId: 'crosstrainer-comissoes-staging',
  storageBucket: 'crosstrainer-comissoes-staging.firebasestorage.app',
  messagingSenderId: '909308167932',
  appId: '1:909308167932:web:be97cf28b5c0169f7ef979'
};

firebase.initializeApp(stagingConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

const $ = id => document.getElementById(id);
function setStatus(msg, cls = 'info') {
  $('status').className = `test-result ${cls}`;
  $('status').textContent = msg;
}
function addResult(label, ok, detail) {
  const div = document.createElement('div');
  div.className = `test-result ${ok ? 'ok' : 'fail'}`;
  div.innerHTML = `<b>${ok ? '✅' : '❌'} ${label}</b><br>${detail}`;
  $('results').appendChild(div);
}

// ─── Auth state listener ────────────────────────────────
auth.onAuthStateChanged(async user => {
  if (!user) {
    setStatus('Não autenticado. Faça login.', 'info');
    $('btn-login').style.display = 'block';
    $('btn-logout').style.display = 'none';
    $('tests-card').style.display = 'none';
    return;
  }
  setStatus(`Autenticado como ${user.email} (uid: ${user.uid})`, 'ok');
  $('btn-login').style.display = 'none';
  $('btn-logout').style.display = 'block';
  $('tests-card').style.display = 'block';
  $('user-info').textContent = `email: ${user.email}\nuid: ${user.uid}`;

  // Já tenta carregar o doc do user e mostra os profiles dele
  try {
    const doc = await db.collection('users').doc(user.uid).get();
    if (doc.exists) {
      const d = doc.data();
      $('user-info').textContent += `\nrole: ${d.role || '(vazio)'}\nprofiles: ${JSON.stringify(d.profiles || [])}\nmoduleAccess: ${JSON.stringify(d.moduleAccess || {})}`;
    } else {
      $('user-info').textContent += `\n⚠️ Documento users/${user.uid} NÃO EXISTE no Firestore. Crie via Console (instruções abaixo).`;
    }
  } catch (err) {
    $('user-info').textContent += `\n❌ Erro ao ler users/{uid}: ${err.code} ${err.message}`;
  }
});

// ─── Botões ─────────────────────────────────────────────
$('btn-login').onclick = async () => {
  try {
    await auth.signInWithEmailAndPassword($('email').value, $('password').value);
  } catch (err) {
    setStatus(`Erro de login: ${err.code} — ${err.message}`, 'fail');
  }
};

$('btn-logout').onclick = () => auth.signOut();

// ─── Testes ─────────────────────────────────────────────
$('btn-run-tests').onclick = async () => {
  $('results').innerHTML = '';

  const tests = [
    {
      name: 'Ler própria coleção users/{meu_uid} — deve PASSAR',
      run: async () => {
        const doc = await db.collection('users').doc(auth.currentUser.uid).get();
        return { ok: doc.exists, detail: doc.exists ? `Doc encontrado: name="${doc.data().name||'?'}"` : 'Doc não existe' };
      }
    },
    {
      name: 'Listar coleção teachers — deve PASSAR (Admin tem acesso)',
      run: async () => {
        const snap = await db.collection('teachers').limit(1).get();
        return { ok: true, detail: `Acesso permitido. Total na amostra: ${snap.size}. (Provavelmente vazia ainda.)` };
      }
    },
    {
      name: 'Ler coleção teacher_salaries — deve PASSAR (Admin tem acesso)',
      run: async () => {
        const snap = await db.collection('teacher_salaries').limit(1).get();
        return { ok: true, detail: `Acesso permitido. Total na amostra: ${snap.size}.` };
      }
    },
    {
      name: 'Listar coleção modalities — deve PASSAR',
      run: async () => {
        const snap = await db.collection('modalities').limit(1).get();
        return { ok: true, detail: `Acesso permitido. Total na amostra: ${snap.size}.` };
      }
    },
    {
      name: 'Ler coleção monthly_closings — deve PASSAR',
      run: async () => {
        const snap = await db.collection('monthly_closings').limit(1).get();
        return { ok: true, detail: `Acesso permitido. Total na amostra: ${snap.size}.` };
      }
    },
    {
      name: 'Tentar escrever em audit_log — deve PASSAR (create)',
      run: async () => {
        const ref = await db.collection('audit_log').add({
          type: 'test',
          details: 'Teste de Security Rules',
          userId: auth.currentUser.uid,
          userName: auth.currentUser.email,
          unitId: null,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        return { ok: true, detail: `Criado com ID: ${ref.id}` };
      }
    },
    {
      name: 'Tentar atualizar audit_log (deveria ser bloqueado) — deve FALHAR',
      run: async () => {
        try {
          const snap = await db.collection('audit_log').limit(1).get();
          if (snap.empty) return { ok: true, detail: 'Coleção vazia, pulando' };
          await snap.docs[0].ref.update({ details: 'modificado' });
          return { ok: false, detail: '⚠️ ATENÇÃO: update foi permitido (não deveria!)' };
        } catch (err) {
          return { ok: true, detail: `✓ Bloqueado corretamente: ${err.code}` };
        }
      }
    },
    {
      name: 'Tentar ler periodos (módulo de Comissões) — deve PASSAR (Admin tem)',
      run: async () => {
        const snap = await db.collection('periodos').limit(1).get();
        return { ok: true, detail: `Acesso permitido. Total na amostra: ${snap.size}.` };
      }
    }
  ];

  for (const t of tests) {
    try {
      const res = await t.run();
      addResult(t.name, res.ok, res.detail);
    } catch (err) {
      addResult(t.name, false, `Erro: ${err.code || ''} ${err.message}`);
    }
  }
};

setStatus('Pronto. Faça login para começar.', 'info');
</script>
</body>
</html>
